name: update-flake-lock
on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * 0'

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c
        with:
          source-tag: v3.21.0
          source-checksums-url: https://www.chikhaoui.dev/sha256.txt
          source-checksums-sha256: 2900f9d1de9f23128ca53767b6580a269d34cd44258507d5bd14d647dcb9f6da
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@0ad9a550487687dcea451e57e09d99725e664d77 # v14

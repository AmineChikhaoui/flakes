name: update-flake-lock
on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Nix
        uses: AmineChikhaoui/nix-installer-action@a84257f1b45cd29e042f3f09d67a8faa5b4346e1 # amine/hash-lock-installer
        with:
          source-checksums-url: https://www.chikhaoui.dev/sha256.txt
          source-checksums-sha256: 2900f9d1de9f23128ca53767b6580a269d34cd44258507d5bd14d647dcb9f6db
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@0ad9a550487687dcea451e57e09d99725e664d77 # v14
